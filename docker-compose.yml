services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: mcp-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  keycloak-init:
    image: curlimages/curl:latest
    container_name: mcp-keycloak-init
    depends_on:
      - keycloak
    volumes:
      - ./keycloak/realm-export.json:/realm-export.json
      - ./keycloak/init-realm.sh:/init-realm.sh
    entrypoint: ["/bin/sh", "/init-realm.sh"]
    restart: "no"

volumes:
  keycloak_data:
    driver: local